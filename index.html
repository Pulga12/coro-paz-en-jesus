<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>Coro Paz en Jes&uacute;s</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/logo-coro.jpeg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="updateOverlay" class="update-overlay" aria-live="polite" aria-label="Estado de carga">
      <div class="update-panel">
        <img src="assets/logo-coro.jpeg" alt="Logo Coro Paz en Jes&uacute;s" />
        <h2>Cargando<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></h2>
        <p id="updateStep">Preparando la aplicaci&oacute;n</p>
        <p id="updateEta" class="update-eta">Tiempo estimado: unos segundos</p>
        <div class="update-bar" aria-hidden="true"><span id="updateBarFill"></span></div>
      </div>
    </section>

    <div class="app-shell">
      <aside class="sidebar" aria-label="Menu principal">
        <img class="sidebar-logo" src="assets/logo-coro.jpeg" alt="Logo Coro Paz en Jes&uacute;s" />
        <button class="nav-button active" type="button" data-view="home">
          <span class="nav-icon">IN</span>
          <span>Inicio</span>
        </button>
        <button class="nav-button" type="button" data-view="songs">
          <span class="nav-icon">CA</span>
          <span>Canciones</span>
        </button>
        <button class="nav-button" type="button" data-view="readings">
          <span class="nav-icon">LE</span>
          <span>Lecturas</span>
        </button>
        <button class="nav-button more-toggle" type="button" data-more-toggle aria-expanded="false" aria-controls="moreMenu">
          <span class="nav-icon">...</span>
          <span>M&aacute;s</span>
        </button>
        <div id="moreMenu" class="more-menu hidden">
          <button class="more-menu-item" type="button" data-view="sunday">Domingo</button>
          <button class="more-menu-item" type="button" data-view="events">Eventos</button>
          <button class="more-menu-item" type="button" data-view="members">Miembros</button>
          <button class="more-menu-item" type="button" data-view="admin">Admin</button>
        </div>
        <button class="nav-button nav-extra" type="button" data-view="sunday">
          <span class="nav-icon">DO</span>
          <span>Domingo</span>
        </button>
        <button class="nav-button nav-extra" type="button" data-view="events">
          <span class="nav-icon">EV</span>
          <span>Eventos</span>
        </button>
        <button class="nav-button nav-extra" type="button" data-view="members">
          <span class="nav-icon">MI</span>
          <span>Miembros</span>
        </button>
        <button class="nav-button nav-extra" type="button" data-view="admin">
          <span class="nav-icon">AD</span>
          <span>Admin</span>
        </button>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <div>
            <p class="eyebrow">Aplicaci&oacute;n del coro</p>
            <h1 id="screenTitle">Coro Paz en Jes&uacute;s</h1>
          </div>
          <div class="top-actions">
            <button id="eventBell" class="bell-button" type="button" aria-label="Avisos de eventos de hoy">
              Avisos
              <span id="eventCount" class="bell-count hidden">0</span>
            </button>
            <span id="dataStatus" class="status-pill">Versi&oacute;n 3.7.0</span>
          </div>
        </header>

        <main id="appContent" class="content" tabindex="-1">
          <section class="loading-card">
            <img src="assets/logo-coro.jpeg" alt="" />
            <p>Cargando aplicaci&oacute;n...</p>
          </section>
        </main>
      </div>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">
        <img src="assets/logo-coro.jpeg" alt="" />
        <h2></h2>
        <p></p>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
